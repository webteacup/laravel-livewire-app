# Basic stack: PHP-FPM (app) + Nginx + MySQL.
# First run (from project root, after copying .env and setting DB_* below):
#   docker compose up -d --build
#   docker compose exec app composer install
#   docker compose exec app php artisan key:generate
#   docker compose exec app php artisan migrate --seed
#   docker compose exec app php artisan storage:link
# .env for containers: DB_HOST=mysql DB_PORT=3306 DB_USERNAME=root DB_PASSWORD=secret
# (match MYSQL_ROOT_PASSWORD; override with DB_PASSWORD in .env / compose env)
# APP_URL=http://localhost:8080   (or your APP_PORT)
# Frontend assets: npm ci && npm run production on the host (or add a Node image later).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www/html
    environment:
      PHP_OPCACHE_VALIDATE_TIMESTAMPS: "1"
      # Inside the app container, 127.0.0.1 is this container — not MySQL. These
      # override .env so local DB_HOST=127.0.0.1 still works on the host.
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: "${DB_DATABASE:-material_pro_livewire}"
      DB_USERNAME: root
      DB_PASSWORD: "${DB_PASSWORD:-secret}"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - app

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-material_pro_livewire}"
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD:-secret}"
    ports:
      - "${DB_PORT_PUBLISH:-33060}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-uroot",
          "-p${DB_PASSWORD:-secret}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  mysql_data:
